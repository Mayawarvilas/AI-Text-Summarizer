<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="container">
        <div class="header">
            <h1>AI Text Summarizer</h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
        </div>

        <div class="input-section">
            <textarea id="inputText" placeholder="Paste your article, document, or any text here... (up to 5000 words)"></textarea>
            <div class="word-count" id="wordCount">0 words</div>
        </div>

        <div class="controls">
            <div class="slider-container">
                <div class="slider-label">
                    <span>Summary Length</span>
                    <span id="sliderValue">Medium</span>
                </div>
                <input type="range" id="summaryLength" min="1" max="5" value="3">
            </div>
            <button class="btn btn-primary" id="summarizeBtn">✨ Summarize Text</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="output-section" id="outputSection">
            <div class="summary empty-state" id="summary">
                Enter text above and click "Summarize" to generate a concise summary.
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
